# Configuration Mosquitto Sécurisée - Installation Native (hors Docker)
# Chemins absolus pour une installation sur le système hôte

# Désactiver l'accès anonyme
allow_anonymous false

# Fichier de mots de passe
password_file /etc/mosquitto/passwd

# Fichier ACL
acl_file /etc/mosquitto/acl

# Listener MQTT standard (port 1883)
listener 1883

# Listener MQTT sécurisé TLS (port 8883)
listener 8883
cafile /etc/mosquitto/certs/ca.crt
certfile /etc/mosquitto/certs/server.crt
keyfile /etc/mosquitto/certs/server.key

# Pour activer le mTLS (authentification mutuelle par certificat client) :
# require_certificate true

# Logs
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
