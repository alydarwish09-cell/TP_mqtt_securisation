# Configuration Mosquitto Sécurisée - TP IoT

# Désactiver l'accès anonyme
allow_anonymous false

# Fichier de mots de passe
password_file /mosquitto/config/passwd

# Fichier ACL
acl_file /mosquitto/config/acl

# Listener MQTT non sécurisé (interne uniquement)
listener 1883
# Restreindre l'accès au port 1883 à localhost si on veut être strict, 
# mais dans Docker on l'expose souvent pour les tests internes.

# Listener MQTT sécurisé avec TLS
listener 8883
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Exiger un certificat client pour le mTLS (optionnel selon le niveau de sécurité souhaité)
# require_certificate true

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_type all
